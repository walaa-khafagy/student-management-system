<div *ngIf="students.length === 0" class="alert alert-info" role="status">No students to display.</div>

<div *ngIf="students.length > 0" class="table-responsive card shadow-sm">
  <table class="table table-striped table-hover mb-0">
    <thead class="table-primary">
      <tr>
        <th scope="col">ID</th>
        <th scope="col">Name</th>
        <th scope="col">Age</th>
        <th scope="col">Department</th>
        <th scope="col">GPA</th>
        <th scope="col" class="text-end">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let student of students; trackBy: trackById">
        <td>{{ student.id }}</td>
        <td>{{ displayName(student) }}</td>
        <td>{{ student.age }}</td>
        <td>{{ student.department}}</td>
        <td>{{ student.GPA | number: '1.1-2' }}</td>
        <td class="text-end text-nowrap">
          <button type="button" class="btn btn-sm btn-outline-info me-1" (click)="emitView(student.id)">
            View
          </button>
          <button type="button" class="btn btn-sm btn-outline-danger" (click)="emitDelete(student.id)">
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
