<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <h1 class="h2 mb-4">Add student</h1>

            <form (ngSubmit)="onSubmit()" class="card shadow-sm p-4" novalidate>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="firstName">First name</label>
                        <input id="firstName" name="firstName" type="text" class="form-control"
                            [class.is-invalid]="submitted && !firstName.trim()" [(ngModel)]="firstName" required />
                        <div class="invalid-feedback" *ngIf="submitted && !firstName.trim()">
                            First name is required.
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="lastName">Last name</label>
                        <input id="lastName" name="lastName" type="text" class="form-control"
                            [class.is-invalid]="submitted && !lastName.trim()" [(ngModel)]="lastName" required />
                        <div class="invalid-feedback" *ngIf="submitted && !lastName.trim()">
                            Last name is required.
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="age">Age</label>
                    <input id="age" name="age" type="number" class="form-control"
                        [class.is-invalid]="submitted && (age === null || age < 1)" [(ngModel)]="age" required
                        min="1" />
                    <div class="invalid-feedback" *ngIf="submitted && (age === null || age < 1)">
                        Enter a valid age.
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="department">Department</label>
                    <input id="department" name="department" type="text" class="form-control"
                        [class.is-invalid]="submitted && !department.trim()" [(ngModel)]="department" required />
                    <div class="invalid-feedback" *ngIf="submitted && !department.trim()">
                        Department is required.
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="email">Email</label>
                    <input id="email" name="email" type="email" class="form-control"
                        [class.is-invalid]="submitted && !email.trim()" [(ngModel)]="email" required />
                    <div class="invalid-feedback" *ngIf="submitted && !email.trim()">Email is required.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="phone">Phone</label>
                    <input id="phone" name="phone" type="tel" class="form-control"
                        [class.is-invalid]="submitted && !phone.trim()" [(ngModel)]="phone" required />
                    <div class="invalid-feedback" *ngIf="submitted && !phone.trim()">Phone is required.</div>
                </div>

                <div class="mb-4">
                    <label class="form-label" for="gpa">GPA</label>
                    <input id="gpa" name="gpa" type="number" class="form-control" step="0.01" min="0" max="4"
                        [class.is-invalid]="
              submitted && (GPA === null || GPA < 0 || GPA > 4)
            " [(ngModel)]="GPA" required />
                    <div class="invalid-feedback" *ngIf="submitted && (GPA === null || GPA < 0 || GPA > 4)">
                        GPA must be between 0 and 4.
                    </div>
                </div>

                <h2 class="h5 mt-2 mb-3">Additional details (optional)</h2>

                <div class="mb-3">
                    <label class="form-label" for="gender">Gender</label>
                    <select id="gender" name="gender" class="form-select" [(ngModel)]="gender">
                        <option value="">Select gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="address">Address</label>
                    <input id="address" name="address" type="text" class="form-control" [(ngModel)]="address" />
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="city">City</label>
                        <input id="city" name="city" type="text" class="form-control" [(ngModel)]="city" />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="country">Country</label>
                        <input id="country" name="country" type="text" class="form-control" [(ngModel)]="country" />
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="level">Level</label>
                        <input id="level" name="level" type="number" min="1" class="form-control" [(ngModel)]="level" />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="enrollmentDate">Enrollment date</label>
                        <input id="enrollmentDate" name="enrollmentDate" type="date" class="form-control"
                            [(ngModel)]="enrollmentDate" />
                    </div>
                </div>

                <div class="form-check mb-4">
                    <input id="isActive" name="isActive" type="checkbox" class="form-check-input"
                        [(ngModel)]="isActive" />
                    <label class="form-check-label" for="isActive">Student is active</label>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save student</button>
                    <a routerLink="/students" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
